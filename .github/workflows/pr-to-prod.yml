name: Auto PR from UAT to PROD

on:
  push:
    branches:
      - uat

jobs:
  create-pr:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install GitHub CLI
        uses: cli/cli-action@v2

      - name: Create PR using gh cli
        run: |
          echo "${{ secrets.GH_PAT }}" | gh auth login --with-token
          gh pr create \
            --base prod \
            --head uat \
            --title "Promote UAT to PROD" \
            --body "Automated PR promoting latest UAT build to production."
